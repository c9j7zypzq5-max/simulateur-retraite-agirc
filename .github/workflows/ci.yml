name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les exécutions précédentes encore en cours sur la même branche/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests unitaires
        run: npm test

      - name: Build (Vite + HTML statiques)
        run: npm run build
